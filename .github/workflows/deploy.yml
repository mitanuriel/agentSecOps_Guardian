name: Deploy to Hetzner

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Hetzner Cloud
    runs-on: ubuntu-latest
    needs: []  # Add 'test' here if you want CI to pass first (e.g. needs: [test])

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: ${{ secrets.HETZNER_PORT || 22 }}
          script: |
            set -e

            APP_DIR="/opt/agentsecops"
            REPO="https://github.com/mitanuriel/agentSecOps_Guardian.git"

            echo "==> Ensuring app directory exists..."
            sudo mkdir -p $APP_DIR
            sudo chown $USER:$USER $APP_DIR

            echo "==> Pulling latest code..."
            if [ -d "$APP_DIR/.git" ]; then
              cd $APP_DIR && git fetch origin main && git reset --hard origin/main
            else
              git clone --branch main $REPO $APP_DIR
            fi

            echo "==> Setting up Python virtual environment..."
            cd $APP_DIR
            python3 -m venv .venv
            .venv/bin/pip install --upgrade pip
            .venv/bin/pip install -r requirements.txt
            .venv/bin/pip install uvicorn fastapi python-multipart

            echo "==> Installing/refreshing systemd service..."
            sudo cp deploy/agentsecops.service /etc/systemd/system/agentsecops.service
            sudo systemctl daemon-reload
            sudo systemctl enable agentsecops

            echo "==> Restarting service..."
            sudo systemctl restart agentsecops

            echo "==> Health check..."
            sleep 3
            curl -sf http://localhost:8000/health || (sudo journalctl -u agentsecops -n 30 && exit 1)

            echo "==> Deployment complete!"
